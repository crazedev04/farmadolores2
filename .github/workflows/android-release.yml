name: Android Release Build

on:
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for var_name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!var_name:-}" ]; then
              echo "::error::Missing required secret: ${var_name}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare keystore and Gradle signing vars
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KEYSTORE_PATH="${RUNNER_TEMP}/release-keystore.jks"
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${KEYSTORE_PATH}"
          echo "MYAPP_RELEASE_STORE_FILE=${KEYSTORE_PATH}" >> "$GITHUB_ENV"
          echo "MYAPP_RELEASE_STORE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}" >> "$GITHUB_ENV"
          echo "MYAPP_RELEASE_KEY_ALIAS=${ANDROID_KEY_ALIAS}" >> "$GITHUB_ENV"
          echo "MYAPP_RELEASE_KEY_PASSWORD=${ANDROID_KEY_PASSWORD}" >> "$GITHUB_ENV"

      - name: Validate signing setup
        env:
          MYAPP_RELEASE_STORE_FILE: ${{ env.MYAPP_RELEASE_STORE_FILE }}
          MYAPP_RELEASE_STORE_PASSWORD: ${{ env.MYAPP_RELEASE_STORE_PASSWORD }}
          MYAPP_RELEASE_KEY_ALIAS: ${{ env.MYAPP_RELEASE_KEY_ALIAS }}
          MYAPP_RELEASE_KEY_PASSWORD: ${{ env.MYAPP_RELEASE_KEY_PASSWORD }}
        run: yarn android:release:check-signing

      - name: Validate keystore alias/passwords (fast-fail)
        env:
          MYAPP_RELEASE_STORE_FILE: ${{ env.MYAPP_RELEASE_STORE_FILE }}
          MYAPP_RELEASE_STORE_PASSWORD: ${{ env.MYAPP_RELEASE_STORE_PASSWORD }}
          MYAPP_RELEASE_KEY_ALIAS: ${{ env.MYAPP_RELEASE_KEY_ALIAS }}
          MYAPP_RELEASE_KEY_PASSWORD: ${{ env.MYAPP_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          keytool -list \
            -keystore "${MYAPP_RELEASE_STORE_FILE}" \
            -storepass "${MYAPP_RELEASE_STORE_PASSWORD}" \
            -alias "${MYAPP_RELEASE_KEY_ALIAS}" \
            -keypass "${MYAPP_RELEASE_KEY_PASSWORD}" \
            >/dev/null

      - name: Build release APK
        env:
          ORG_GRADLE_PROJECT_MYAPP_RELEASE_STORE_FILE: ${{ env.MYAPP_RELEASE_STORE_FILE }}
          ORG_GRADLE_PROJECT_MYAPP_RELEASE_STORE_PASSWORD: ${{ env.MYAPP_RELEASE_STORE_PASSWORD }}
          ORG_GRADLE_PROJECT_MYAPP_RELEASE_KEY_ALIAS: ${{ env.MYAPP_RELEASE_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_MYAPP_RELEASE_KEY_PASSWORD: ${{ env.MYAPP_RELEASE_KEY_PASSWORD }}
        run: yarn android:release:apk

      - name: Build release AAB
        env:
          ORG_GRADLE_PROJECT_MYAPP_RELEASE_STORE_FILE: ${{ env.MYAPP_RELEASE_STORE_FILE }}
          ORG_GRADLE_PROJECT_MYAPP_RELEASE_STORE_PASSWORD: ${{ env.MYAPP_RELEASE_STORE_PASSWORD }}
          ORG_GRADLE_PROJECT_MYAPP_RELEASE_KEY_ALIAS: ${{ env.MYAPP_RELEASE_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_MYAPP_RELEASE_KEY_PASSWORD: ${{ env.MYAPP_RELEASE_KEY_PASSWORD }}
        run: yarn android:release:aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
